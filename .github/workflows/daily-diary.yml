name: 秘書トラペル子 定期処理

on:
  schedule:
    - cron: '0 22 * * *'   # 毎日 07:00 JST (= UTC 22:00 前日)
  workflow_dispatch:
    inputs:
      task:
        description: 実行したい処理
        required: false
        default: scheduler
        type: choice
        options:
          - scheduler
          - reminders
          - wake
          - diary
          - all

concurrency:
  group: secretary-scheduler-${{ github.ref }}-${{ github.event_name == 'schedule' && github.event.schedule || github.event.inputs.task || 'manual' }}
  cancel-in-progress: true

jobs:
  send-event-reminders:
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'scheduler' || github.event.inputs.task == 'reminders' || github.event.inputs.task == 'all'))
    uses: ./.github/workflows/event-reminder.yml
    secrets: inherit

  send-wake-alarms:
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'scheduler' || github.event.inputs.task == 'wake' || github.event.inputs.task == 'all'))
    uses: ./.github/workflows/wake-alarm.yml
    secrets: inherit

  generate-diary:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 22 * * *') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'diary' || github.event.inputs.task == 'all'))
    runs-on: ubuntu-latest
    permissions:
      contents: write        # blog/ へのコミットに必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        working-directory: scripts

      - name: Generate diary
        env:
          YOUTUBE_API_KEY:          ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          HATENA_ID:                ${{ secrets.HATENA_ID }}
          HATENA_BLOG_ID:           ${{ secrets.HATENA_BLOG_ID }}
          HATENA_API_KEY:           ${{ secrets.HATENA_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_DATABASE_URL:    ${{ secrets.FIREBASE_DATABASE_URL }}
          DIARY_PHOTO_URL:          ${{ secrets.DIARY_PHOTO_URL }}
          DIARY_PHOTO_CAPTION:      ${{ secrets.DIARY_PHOTO_CAPTION }}
          DIARY_GEMINI_MODEL:       ${{ vars.DIARY_GEMINI_MODEL }}
          DIARY_GEMINI_FALLBACK_MODELS: ${{ vars.DIARY_GEMINI_FALLBACK_MODELS }}
          DIARY_GROUP_SOURCE_ID:    ${{ secrets.DIARY_GROUP_SOURCE_ID }}
        run: node scripts/generate-diary.js

      - name: Commit blog archive
        run: |
          git config user.email "traperuko@winning-roulette.local"
          git config user.name "秘書トラペル子"
          git add blog/
          git diff --cached --quiet && echo "no changes" || git commit -m "日記: $(TZ=Asia/Tokyo date +%Y-%m-%d)"
          git push
